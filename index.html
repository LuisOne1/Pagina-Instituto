<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas Pro - Dashboard</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <h2>Gestión Pro</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="caja-diaria.html" class="nav-link">
                        <i class="fas fa-cash-register"></i>
                        <span>Caja Diaria</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="ventas.html" class="nav-link">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Ventas</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="ventas-eliminadas.html" class="nav-link">
                        <i class="fas fa-trash-alt"></i>
                        <span>Ventas Eliminadas</span>
                    </a>
                </li>
                 <li class="nav-item active">
                    <a href="cuentas-cobrar.html" class="nav-link">
                        <i class="fas fa-file-invoice-dollar"></i>
                        <span>Cuentas por Cobrar</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <i class="fas fa-bars menu-toggle"></i>
                    <h1>Dashboard</h1>
                </div>
                <div class="header-right">
                    <span class="user-profile">
                        <i class="fas fa-user"></i>
                        Admin | $<span id="total-balance">0.00</span>
                    </span>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-money-bill-wave"></i>
                        <h3>Ventas Hoy</h3>
                    </div>
                    <div class="card-body">
                        <div class="metric" id="today-sales">$ 0.00</div>
                        <div class="metric-change positive" id="sales-change">+0%</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-cash-register"></i>
                        <h3>Saldo Actual</h3>
                    </div>
                    <div class="card-body">
                        <div class="metric" id="current-balance">$ 0.00</div>
                        <div class="metric-change positive" id="balance-change">+0%</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-users"></i>
                        <h3>Clientes Hoy</h3>
                    </div>
                    <div class="card-body">
                        <div class="metric" id="today-clients">0</div>
                        <div class="metric-change positive" id="clients-change">+0%</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-box"></i>
                        <h3>Productos Vendidos</h3>
                    </div>
                    <div class="card-body">
                        <div class="metric" id="products-sold">0</div>
                        <div class="metric-change positive" id="products-change">+0%</div>
                    </div>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card large">
                    <h4>Meta Semanal</h4>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="weekly-progress" style="width: 0%"></div>
                        </div>
                        <span class="progress-text" id="weekly-text">$0 / $25,000</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <h3>Prueba desde la Web</h3>
</body>
</html>
